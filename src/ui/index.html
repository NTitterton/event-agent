<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">Cloud event runtime</p>
          <h1>Event Agent</h1>
        </div>
        <div class="actions">
          <input id="token" type="password" autocomplete="off" placeholder="API token" />
          <button id="save-token" type="button">Save</button>
          <button id="refresh" type="button">Refresh</button>
        </div>
      </header>
      <div id="status" class="status-line muted" aria-live="polite"></div>

      <section class="grid">
        <article>
          <div class="panel-heading">
            <h2>Agents</h2>
            <button id="toggle-agent-form" class="secondary compact" type="button" aria-expanded="false" aria-controls="agent-create-panel">Create</button>
          </div>
          <div id="agents" class="list muted">No agents loaded.</div>
        </article>

        <article>
          <h2>Schedules</h2>
          <div id="schedules" class="list muted">Set `EVENT_AGENT_AUTH_TOKEN` and connect the API.</div>
        </article>

        <article class="runs-panel">
          <h2>Runs</h2>
          <div id="runs" class="list muted">No runs loaded.</div>
        </article>
      </section>

      <section class="detail-panel">
        <div class="detail-heading">
          <h2>Run Detail</h2>
          <button id="clear-selection" class="secondary" type="button">Clear</button>
        </div>
        <div id="run-detail" class="muted">Select a run to inspect logs and artifacts.</div>
      </section>

      <section id="agent-create-panel" class="detail-panel collapsible-panel" hidden>
        <div class="detail-heading">
          <h2>Create Agent</h2>
          <button id="close-agent-form" class="secondary" type="button">Close</button>
        </div>
        <form id="agent-form" class="agent-form">
          <label>
            <span>Name</span>
            <input id="agent-name" name="name" type="text" autocomplete="off" required placeholder="Daily market brief" />
          </label>
          <label>
            <span>Provider</span>
            <select id="agent-provider" name="modelProvider">
              <option value="openai" selected>OpenAI</option>
              <option value="anthropic">Anthropic</option>
              <option value="gemini">Gemini</option>
              <option value="bedrock">Bedrock</option>
            </select>
          </label>
          <label>
            <span>Model</span>
            <input id="agent-model" name="model" type="text" value="gpt-4.1-mini" required />
          </label>
          <label>
            <span>Output prefix</span>
            <input id="agent-output-prefix" name="outputPrefix" type="text" placeholder="agents/daily-market-brief" />
          </label>
          <label class="wide">
            <span>Description</span>
            <input id="agent-description" name="description" type="text" placeholder="What this agent does" />
          </label>
          <label class="wide">
            <span>System prompt</span>
            <textarea id="agent-system-prompt" name="systemPrompt" rows="3" required placeholder="You write concise, factual reports."></textarea>
          </label>
          <label class="wide">
            <span>User prompt template</span>
            <textarea id="agent-user-prompt" name="userPromptTemplate" rows="5" required placeholder="Today is {{date}}. Write a brief report."></textarea>
          </label>
          <div class="form-actions">
            <button type="submit">Create Agent</button>
          </div>
        </form>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
